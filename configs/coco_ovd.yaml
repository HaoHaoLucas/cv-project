# OVD 评测配置 —— COCO val2017

model:
  # 后端: "gdino"（源码安装）或 "hf"（HuggingFace，无需编译 CUDA 算子）
  backend: gdino
  config_path: configs/GroundingDINO_SwinT_OGC.py
  weights_path: weights/groundingdino_swint_ogc.pth
  hf_model_id: IDEA-Research/grounding-dino-tiny   # backend=hf 时生效
  device: cuda

inference:
  box_threshold: 0.25
  text_threshold: 0.20
  max_side: 800        # 图片长边 resize；显存紧张时改为 600
  batch_size: 1

data:
  val_img_dir: data/coco/val2017
  ann_file: data/coco/annotations/instances_val2017.json
  # null = 全量 5000 张；正整数 = 随机子采样
  subset: null

prompt:
  # "concat_token" → 官方 token span + positive map（推荐）
  # "concat" → 短语字符串匹配（旧）
  # "single" → 每类单独送入（慢，映射更精确）
  mode: concat_token
  num_select: 300
  separator: ". "
  # 消融模板："{name}" / "a {name}" / "a photo of a {name}"
  template: "{name}"

output:
  predictions_path: results/coco_gdino/predictions.json
  metrics_path: results/coco_gdino/metrics.json
  log_unmatched: true
